<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo | Ariela Rodrigues</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="admin-login-body">

    <div class="login-container">
        <h1 class="logo">Ariela <span>Painel</span></h1>
        <p>Acesso exclusivo para gestão de leads e CRM.</p>

        <form action="/api/admin/login" method="POST" class="login-form">
            <div class="form-group">
                <label for="email">E-mail Corporativo:</label>
                <input type="email" id="email" name="email" required placeholder="ariela@corretora.com">
            </div>

            <div class="form-group">
                <label for="senha">Senha de Acesso:</label>
                <input type="password" id="senha" name="senha" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">Entrar no Sistema</button>
        </form>
        <a href="/" class="back-link">← Voltar para o Site Público</a>
    </div>

</body>
</html>
